<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CamShadow Floating Camera</title>
    <style>
      html, body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: transparent;
        overflow: hidden;
      }

      .drag-root {
        width: 100%;
        height: 100%;
        display: grid;
        place-items: center;
        cursor: move;
      }

      .camera-shell {
        width: 280px;
        height: 280px;
        border-radius: 50%;
        box-shadow: 0 14px 20px rgba(0, 0, 0, 0.45);
        cursor: move;
      }

      .camera-clip {
        width: 100%;
        height: 100%;
        overflow: hidden;
        border: 2px solid #fff;
        border-radius: 50%;
        background: #111;
      }

      video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transform: scaleX(-1);
        pointer-events: none;
      }

      .mask {
        position: absolute;
        inset: 0;
        pointer-events: none;
        border-radius: inherit;
      }

      .fallback {
        color: #d9ddff;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 12px;
        position: absolute;
        inset: 0;
        display: none;
        place-items: center;
        text-align: center;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.03));
      }

      .fallback.show {
        display: grid;
      }
    </style>
  </head>
  <body>
    <div class="drag-root" data-tauri-drag-region>
      <div id="cameraShell" class="camera-shell" data-tauri-drag-region>
        <div id="cameraClip" class="camera-clip" data-tauri-drag-region>
          <video id="preview" autoplay muted playsinline></video>
          <div id="fallback" class="fallback">摄像头未开启</div>
        </div>
      </div>
    </div>

    <script src="./camera.js"></script>
  </body>
</html>
