<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CamShadow 控制中心</title>
    <style>
      :root { color-scheme: dark; }
      html, body { width: 100%; height: 100%; overflow: hidden; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: radial-gradient(circle at top left, #1f1f2e, #121218 58%);
        color: #f5f7ff;
      }
      .app {
        padding: 20px;
        display: grid;
        grid-template-columns: 210px 210px 1fr;
        gap: 16px;
        height: 100%;
      }
      .panel {
        background: rgba(255,255,255,0.06);
        border: 1px solid rgba(255,255,255,0.15);
        border-radius: 14px;
        backdrop-filter: blur(8px);
        padding: 14px;
        overflow-y: auto;
      }
      .controls { display: grid; gap: 8px; }
      .section-title {
        margin: 8px 0 4px;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.07em;
        text-transform: uppercase;
        opacity: 0.5;
        border-bottom: 1px solid rgba(255,255,255,0.1);
        padding-bottom: 4px;
      }
      .section-title:first-child { margin-top: 0; }
      label { font-size: 12px; display: grid; gap: 4px; }
      .checkbox-inline { display: flex; align-items: center; gap: 8px; }
      input[type='range'] { width: 100%; }
      select {
        width: 100%;
        background: rgba(255,255,255,0.1);
        border: 1px solid rgba(255,255,255,0.2);
        color: #fff;
        border-radius: 6px;
        padding: 5px 8px;
        font-size: 12px;
        cursor: pointer;
      }
      select option { background: #1f1f2e; }
      .main { display: flex; align-items: flex-end; }
      button {
        padding: 7px 14px; border-radius: 8px;
        border: 1px solid rgba(255,255,255,0.2);
        background: rgba(255,255,255,0.08);
        color: #fff; cursor: pointer; font-size: 12px;
        transition: background 0.15s; white-space: nowrap;
      }
      button:hover { background: rgba(255,255,255,0.14); }
      .frame-size-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
      .num-input {
        width: 100%;
        background: rgba(255,255,255,0.08);
        border: 1px solid rgba(255,255,255,0.2);
        color: #fff; border-radius: 6px;
        padding: 4px 6px; font-size: 12px;
      }
      .bottom-status {
        font-size: 12px; opacity: 0.6;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <!-- 摄像头面板 -->
      <aside class="panel controls">
        <p class="section-title">摄像头输入源</p>
        <label>选择摄像头
          <select id="cameraSelect">
            <option value="">-- 默认摄像头 --</option>
          </select>
        </label>

        <p class="section-title">悬浮摄像头样式</p>
        <label>摄像头大小
          <input id="cameraSize" type="range" min="160" max="420" value="280" />
        </label>
        <label>圆角半径
          <input id="radius" type="range" min="0" max="140" value="140" />
        </label>
        <label>边框粗细
          <input id="borderWidth" type="range" min="0" max="12" value="2" />
        </label>
        <label>阴影模糊
          <input id="shadowBlur" type="range" min="0" max="60" value="20" />
        </label>
        <label>边框颜色
          <input id="borderColor" type="color" value="#ffffff" />
        </label>
        <label>阴影不透明度
          <input id="shadowOpacity" type="range" min="0" max="1" step="0.05" value="0.45" />
        </label>
        <label class="checkbox-inline">
          <input id="clickThrough" type="checkbox" /> 点击穿透（开启后不可拖拽）
        </label>

        <p class="section-title" style="margin-top:12px;">显示控制</p>
        <button id="toggleOverlayBtn">隐藏摄像头浮层</button>
      </aside>

      <!-- 录制框面板 -->
      <aside class="panel controls">
        <p class="section-title">录制框</p>
        <div class="frame-size-group">
          <label>宽度 (px)
            <input id="frameWidth" type="number" min="240" max="1920" value="540" class="num-input" />
          </label>
          <label>高度 (px)
            <input id="frameHeight" type="number" min="320" max="3840" value="960" class="num-input" />
          </label>
        </div>
        <button id="toggleFrameBtn">显示录制框</button>
        <button id="applyFrameSizeBtn">应用尺寸</button>
        <button id="toggleFrameClickThroughBtn">开启穿透</button>
      </aside>

      <!-- 右侧主区域 -->
      <main class="panel main">
        <div class="bottom-status" id="status">摄像头悬浮窗已就绪</div>
      </main>
    </div>

    <script src="./control.js"></script>
  </body>
</html>
