<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CamShadow 控制中心</title>
    <style>
      :root {
        color-scheme: dark;
      }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: radial-gradient(circle at top left, #1f1f2e, #121218 58%);
        color: #f5f7ff;
      }

      .app {
        padding: 20px;
        display: grid;
        grid-template-columns: 220px 1fr;
        gap: 16px;
        height: 100%;
      }

      .panel {
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 14px;
        backdrop-filter: blur(8px);
        padding: 14px;
      }

      .controls { display: grid; gap: 10px; }

      .title {
        margin: 0 0 10px;
        font-size: 14px;
        opacity: 0.9;
      }

      label {
        font-size: 12px;
        display: grid;
        gap: 4px;
      }

      .checkbox-inline {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      input[type='range'] { width: 100%; }

      .main {
        display: grid;
        grid-template-rows: 1fr auto;
        gap: 18px;
      }

      .status {
        text-align: center;
        font-size: 15px;
        opacity: 0.95;
      }

      .hint {
        text-align: center;
        font-size: 12px;
        opacity: 0.7;
      }

      .actions {
        display: flex;
        gap: 10px;
        justify-content: center;
      }

      .actions button {
        padding: 8px 12px;
        border-radius: 8px;
        border: 1px solid rgba(255,255,255,0.2);
        background: rgba(255,255,255,0.08);
        color: #fff;
        cursor: pointer;
      }

      .main-center {
        display: grid;
        place-content: center;
        gap: 12px;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="panel controls">
        <p class="title">悬浮摄像头样式</p>

        <label>摄像头大小
          <input id="cameraSize" type="range" min="160" max="420" value="280" />
        </label>

        <label>圆角半径
          <input id="radius" type="range" min="0" max="140" value="68" />
        </label>

        <label>边框粗细
          <input id="borderWidth" type="range" min="0" max="12" value="2" />
        </label>

        <label>阴影模糊
          <input id="shadowBlur" type="range" min="0" max="60" value="20" />
        </label>

        <label>边框颜色
          <input id="borderColor" type="color" value="#ffffff" />
        </label>

        <label>阴影不透明度
          <input id="shadowOpacity" type="range" min="0" max="1" step="0.05" value="0.45" />
        </label>

        <label class="checkbox-inline">
          <input id="clickThrough" type="checkbox" /> 录制时点击穿透
        </label>
      </aside>

      <main class="panel main">
        <div class="main-center">
          <div id="status" class="status">摄像头悬浮窗已就绪</div>
          <p class="hint">纯摄像头模式：支持样式调节、置顶、拖拽与点击穿透</p>
        </div>

        <div>
          <div class="actions">
            <button id="toggleOverlayBtn">隐藏摄像头浮层</button>
          </div>
        </div>
      </main>
    </div>

    <script src="./control.js"></script>
  </body>
</html>
